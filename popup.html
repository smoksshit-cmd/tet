<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Block Blast</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>⬛ Block Blast</h1>
    <div id="score-box">
      <div id="score-label">Score</div>
      <div id="score">0</div>
    </div>
  </header>

  <div id="game-area">
    <div id="best-row">Best: <span id="best">0</span></div>

    <div id="board-wrap">
      <div id="board"></div>
      <div id="overlay">
        <h2>Game Over</h2>
        <p id="final-score-text"></p>
        <button onclick="restartGame()">Play Again</button>
      </div>
    </div>

    <div id="message">Pick a piece and click a cell</div>

    <div id="pieces-row">
      <div class="piece-slot" id="slot-0" onclick="selectPiece(0)"></div>
      <div class="piece-slot" id="slot-1" onclick="selectPiece(1)"></div>
      <div class="piece-slot" id="slot-2" onclick="selectPiece(2)"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
